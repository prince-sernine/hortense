# Bundled trust seed for Hortense v0.3.2 (Tier 1 AV + essentials).
# Local cache: .hortense/trusted_catalog.yml (from `hortense catalog update`)
# User overrides: .hortense/catalog_overrides.yml

catalog_version: 1

tier1_publishers:
  - AVAST Software s.r.o.
  - Avast Software s.r.o.
  - Gen Digital Inc.
  - NortonLifeLock Inc.
  - Malwarebytes Corporation
  - ESET, spol. s r.o.
  - Kaspersky Lab
  - Bitdefender SRL
  - Bitdefender S.R.L.
  - Webroot Inc.
  - Webroot Software, Inc.

tier2_publishers:
  - Spotify AB
  - Spotify USA Inc
  - Microsoft Corporation
  - Google LLC
  - Zoom Video Communications, Inc.

trust_publishers: []

companion_processes:
  - PhoneExperienceHost.exe
  - YourPhone.exe
  - kdeconnectd.exe
  - QuickShare.exe

trust_path_prefixes:
  - \windows\
  - \program files\
  - \program files (x86)\

cloud_sync_path_prefixes:
  - \appdata\local\microsoft\onedrive\
  - \appdata\local\google\drive fs\

# Process rules are scoped on purpose. A known publisher is not enough by itself:
# keep name, signer, path, source, and expected behavior together.
processes:
  - name: Spotify.exe
    category: media_connect
    source: observed_spotify_connect_appdata_install
    risk_note: Signed Spotify may open local/LAN listener shapes for Connect. Unsigned or wrong-publisher builds stay anomalies.
    publishers:
      - Spotify AB
      - Spotify USA Inc
    path_prefixes:
      - \appdata\roaming\spotify\
    expected_listener: lan_media_control
    expected_network_shape: local_or_lan_connect
